name: Brightcall Supabase Sync

on:
  workflow_dispatch: # Scheduled sync moved to Supabase pg_cron + Edge Function (more reliable)

jobs:
  sync_calls:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Supabase Sync Script
        env:
          BRIGHTCALL_API_KEY: ${{ secrets.BRIGHTCALL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync.js
