name: Brightcall Supabase Sync

on:
  schedule:
    # Runs Hourly every day from 9:00 AM to 7:00 PM GST (Dubai Time)
    # (UTC 5:00 to 15:00)
    - cron: '0 5-15 * * *'
  workflow_dispatch: # Allows you to manually trigger it from GitHub UI

jobs:
  sync_calls:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Supabase Sync Script
        env:
          BRIGHTCALL_API_KEY: ${{ secrets.BRIGHTCALL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync.js
